<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover" />
  
  <!-- Primary Meta Tags -->
  <title>Growthovo - Your Personal Growth Companion</title>
  <meta name="title" content="Growthovo - Your Personal Growth Companion" />
  <meta name="description" content="Transform your life with AI-powered coaching, habit tracking, and daily challenges. Build better habits and achieve your personal growth goals." />
  
  <!-- Theme and PWA -->
  <meta name="theme-color" content="#7C3AED" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Growthovo" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://growthovo.com/" />
  <meta property="og:title" content="Growthovo - Your Personal Growth Companion" />
  <meta property="og:description" content="Transform your life with AI-powered coaching, habit tracking, and daily challenges." />
  <meta property="og:image" content="https://growthovo.com/og-image.png" />
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://growthovo.com/" />
  <meta property="twitter:title" content="Growthovo - Your Personal Growth Companion" />
  <meta property="twitter:description" content="Transform your life with AI-powered coaching, habit tracking, and daily challenges." />
  <meta property="twitter:image" content="https://growthovo.com/og-image.png" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  
  <!-- Fonts Preload (if using custom fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <style>
    /* Reset and base styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #0A0A0A;
      color: #FFFFFF;
    }
    
    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    
    /* Loading spinner */
    #app-loading {
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background-color: #0A0A0A;
    }
    
    #app-loading .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(124, 58, 237, 0.3);
      border-top-color: #7C3AED;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    #app-loading .loading-text {
      margin-top: 20px;
      color: #888;
      font-size: 14px;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    /* Hide loading when app is ready */
    .app-ready #app-loading {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="app-loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading Growthovo...</div>
  </div>
  
  <!-- App Root -->
  <div id="root"></div>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('SW registered:', registration);
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
