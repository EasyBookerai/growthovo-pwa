<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League - Growthovo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0A0A12;
      color: #FFFFFF;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .header { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
    .rank-card {
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .rank-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    .rank-value { font-size: 32px; font-weight: 700; color: #A78BFA; }
    .leaderboard { margin-top: 24px; }
    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .leaderboard-row.current { background: rgba(124,58,237,0.15); }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8,8,15,0.95);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 12px 20px 20px;
      display: flex;
      justify-content: space-around;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      text-decoration: none;
      color: rgba(255,255,255,0.5);
    }
    .nav-item.active { color: #A78BFA; }
    .nav-icon { font-size: 24px; }
    .nav-label { font-size: 11px; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="header">Weekly League 🏆</h1>
    <div class="rank-card">
      <div class="rank-label">YOUR RANK</div>
      <div class="rank-value">#12</div>
      <div style="margin-top: 8px; color: rgba(255,255,255,0.7);">340 XP • Bronze League</div>
    </div>

    <div class="leaderboard">
      <div class="leaderboard-row">
        <span>🥇 #1 Alex</span>
        <span>1,250 XP</span>
      </div>
      <div class="leaderboard-row">
        <span>🥈 #2 Sarah</span>
        <span>1,100 XP</span>
      </div>
      <div class="leaderboard-row">
        <span>🥉 #3 Mike</span>
        <span>980 XP</span>
      </div>
      <div class="leaderboard-row current">
        <span>#12 You</span>
        <span>340 XP</span>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </a>
    <a href="pillars.html" class="nav-item">
      <div class="nav-icon">🎯</div>
      <div class="nav-label">Pillars</div>
    </a>
    <a href="rex.html" class="nav-item">
      <div class="nav-icon">💬</div>
      <div class="nav-label">Rex</div>
    </a>
    <a href="league.html" class="nav-item active">
      <div class="nav-icon">🏆</div>
      <div class="nav-label">League</div>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Profile</div>
    </a>
  </div>
</body>
</html>
