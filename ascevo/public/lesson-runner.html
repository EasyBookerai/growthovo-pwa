
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson | Growthovo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0A0A12;
      color: #FFFFFF;
      min-height: 100vh;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .lesson-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
    }
    .back-btn {
      background: rgba(255,255,255,0.05); border: none; color: #fff; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600;
    }
    .progress-bar {
      height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; flex-grow: 1; margin: 0 12px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #7C3AED, #A78BFA); width: 0%; transition: width 0.3s; }
    .hearts { font-size: 20px; }
    .exercise-label {
      font-size: 12px; text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 700; letter-spacing: 1px; margin-bottom: 8px;
    }
    .question-text {
      font-size: 20px; font-weight: 700; margin-bottom: 24px; line-height: 1.3;
    }
    .options-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .option-btn {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; color: white; text-align: left; cursor: pointer; font-size: 16px; font-family: inherit;
    }
    .option-btn:hover { background: rgba(255,255,255,0.08); }
    .option-btn.selected { border-color: #7C3AED; background: rgba(124,58,237,0.1); }
    .option-btn.correct { background: rgba(52,211,153,0.2); border-color: #34D399; }
    .option-btn.incorrect { background: rgba(239,68,68,0.2); border-color: #EF4444; animation: shake 0.4s; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    .text-input {
      width: 100%; min-height: 100px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; color: white; font-size: 16px; font-family: inherit; margin-bottom: 12px; resize: vertical;
    }
    .check-btn {
      width: 100%; background: linear-gradient(135deg, #7C3AED, #A78BFA); border: none; color: white; border-radius: 100px; padding: 18px; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .check-btn:disabled { background: rgba(124,58,237,0.3); cursor: not-allowed; }
    .feedback-banner {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 24px; border-top-left-radius: 24px; border-top-right-radius: 24px; transform: translateY(100%); transition: transform 0.3s; z-index: 100;
    }
    .feedback-banner.show { transform: translateY(0); }
    .feedback-correct { background: #16A34A; }
    .feedback-wrong { background: #EF4444; }
    .continue-btn {
      width: 100%; background: white; border: none; color: #0A0A12; border-radius: 100px; padding: 16px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 12px;
    }
    .completion-screen {
      text-align: center; display: none;
    }
    .xp-burst {
      font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #7C3AED, #A78BFA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: bounce 1s;
    }
    @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    .stars-earned { font-size: 32px; margin: 16px 0; }
    .rex-take { margin: 16px 0; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="lesson-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="hearts" id="hearts">❤️❤️❤️</div>
    </div>

    <div id="exercise-container">
      <!-- Exercise rendered here -->
    </div>

    <button id="check-btn" class="check-btn" disabled>Check</button>

    <div id="completion-screen" class="completion-screen">
      <h2 style="margin-bottom:16px">Lesson Complete!</h2>
      <div class="xp-burst" id="xp-earned"></div>
      <div class="stars-earned" id="stars-earned"></div>
      <div class="rex-take" id="rex-take"></div>
      <button class="check-btn" onclick="goToTree()">Continue</button>
    </div>
  </div>

  <div id="feedback-banner" class="feedback-banner">
    <h3 id="feedback-heading"></h3>
    <p id="feedback-text" style="margin-bottom:8px"></p>
    <button class="continue-btn" onclick="nextExercise()">Continue</button>
  </div>

  <script src="lessons.js"></script>
  <script src="lesson-service.js"></script>
  <script src="lesson-runner.js"></script>
</body>
</html>
