<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#08080F">
  <title>Growthovo - Your Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #08080F;
      color: #FFFFFF;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    #root {
      min-height: 100vh;
      width: 100%;
    }

    /* Loading state */
    .loading-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .loading-text {
      font-size: 24px;
      font-weight: 700;
      color: #A78BFA;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(167, 139, 250, 0.2);
      border-top-color: #A78BFA;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Ambient orb */
    .orb {
      position: fixed;
      width: 300px;
      height: 300px;
      background: #6C63FF;
      opacity: 0.12;
      filter: blur(80px);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      top: -100px;
      right: -100px;
    }
  </style>
</head>
<body>
  <div class="orb"></div>
  
  <div id="root">
    <div class="loading-container">
      <div class="loading-text">Growthovo</div>
      <div class="loading-spinner"></div>
    </div>
  </div>

  <script>
    // This will be replaced with the actual React Native Web bundle
    // For now, redirect to the Expo dev server or show a message
    console.log('Growthovo App Loading...');
    
    // Check if user is authenticated
    const checkAuth = async () => {
      try {
        // Import Supabase client
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
        
        const supabaseUrl = 'YOUR_SUPABASE_URL'; // This should be replaced with actual env var
        const supabaseKey = 'YOUR_SUPABASE_KEY'; // This should be replaced with actual env var
        
        if (!supabaseUrl || !supabaseKey || supabaseUrl.includes('YOUR_')) {
          console.error('Supabase credentials not configured');
          document.getElementById('root').innerHTML = `
            <div class="loading-container">
              <div class="loading-text">⚠️ Configuration Error</div>
              <p style="color: rgba(255,255,255,0.7); text-align: center; padding: 0 20px;">
                The app is not properly configured. Please set up Supabase credentials.
              </p>
            </div>
          `;
          return;
        }
        
        const supabase = createClient(supabaseUrl, supabaseKey);
        const { data: { session } } = await supabase.auth.getSession();
        
        if (!session) {
          // Not authenticated, redirect to sign in
          window.location.href = '/';
          return;
        }
        
        // User is authenticated, show message that React Native Web bundle is needed
        document.getElementById('root').innerHTML = `
          <div class="loading-container">
            <div class="loading-text">🚧 Development Mode</div>
            <p style="color: rgba(255,255,255,0.7); text-align: center; padding: 0 20px; max-width: 400px;">
              The React Native Web bundle needs to be built. Run <code style="background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;">expo build:web</code> to generate the production bundle.
            </p>
            <button onclick="window.location.href='/'" style="margin-top: 20px; padding: 12px 24px; background: #7C3AED; border: none; border-radius: 100px; color: white; font-weight: 600; cursor: pointer;">
              Go Back
            </button>
          </div>
        `;
      } catch (error) {
        console.error('Auth check failed:', error);
        document.getElementById('root').innerHTML = `
          <div class="loading-container">
            <div class="loading-text">⚠️ Error</div>
            <p style="color: rgba(255,255,255,0.7); text-align: center; padding: 0 20px;">
              Failed to load the app. Please try again.
            </p>
            <button onclick="window.location.reload()" style="margin-top: 20px; padding: 12px 24px; background: #7C3AED; border: none; border-radius: 100px; color: white; font-weight: 600; cursor: pointer;">
              Retry
            </button>
          </div>
        `;
      }
    };
    
    checkAuth();
  </script>
</body>
</html>
