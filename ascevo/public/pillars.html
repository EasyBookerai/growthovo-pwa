<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pillars - Growthovo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0A0A12;
      color: #FFFFFF;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .header { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
    
    /* Filter Chips */
    .filter-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 0;
      margin-bottom: 20px;
      scrollbar-width: none;
    }
    .filter-chips::-webkit-scrollbar { display: none; }
    .filter-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1A1A2E;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 100px;
      padding: 10px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .filter-chip.active {
      background: var(--pillar-color);
      color: #FFF;
      border-color: transparent;
    }
    .filter-chip:not(.active) {
      color: rgba(255,255,255,0.5);
    }
    .chip-emoji { font-size: 18px; }
    .chip-text { font-size: 15px; font-weight: 600; }
    
    /* Lesson Cards */
    .lessons-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .lesson-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1A1A2E;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lesson-card:hover { background: #222238; }
    .lesson-icon {
      width: 44px;
      height: 44px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #FFF;
      flex-shrink: 0;
    }
    .lesson-content { flex: 1; }
    .lesson-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .lesson-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
    .lesson-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    .lesson-action { font-size: 20px; }
    
    /* Challenge Card */
    .challenge-card {
      background: rgba(52, 211, 153, 0.15);
      border: 2px solid #34D399;
      border-radius: 16px;
      padding: 16px;
      margin-top: 12px;
    }
    .challenge-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .challenge-title { font-size: 17px; font-weight: 700; color: #34D399; }
    .xp-badge {
      background: #34D399;
      color: #FFF;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 100px;
    }
    .challenge-desc { font-size: 15px; color: rgba(255,255,255,0.9); margin-bottom: 16px; line-height: 1.5; }
    .challenge-btn {
      background: #34D399;
      color: #FFF;
      font-size: 15px;
      font-weight: 700;
      padding: 12px;
      border-radius: 100px;
      text-align: center;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8,8,15,0.95);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 12px 20px 20px;
      display: flex;
      justify-content: space-around;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      text-decoration: none;
      color: rgba(255,255,255,0.5);
    }
    .nav-item.active { color: #A78BFA; }
    .nav-icon { font-size: 24px; }
    .nav-label { font-size: 11px; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="header">Your Pillars</h1>
    <p class="subtitle">Choose your growth area</p>
    
    <!-- Filter Chips -->
    <div class="filter-chips" id="filter-chips"></div>
    
    <!-- Lessons List -->
    <div class="lessons-list" id="lessons-list"></div>
    
    <!-- Daily Challenge -->
    <div class="challenge-card" id="challenge-card" style="display:none;"></div>
  </div>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </a>
    <a href="pillars.html" class="nav-item active">
      <div class="nav-icon">🎯</div>
      <div class="nav-label">Pillars</div>
    </a>
    <a href="rex.html" class="nav-item">
      <div class="nav-icon">💬</div>
      <div class="nav-label">Rex</div>
    </a>
    <a href="league.html" class="nav-item">
      <div class="nav-icon">🏆</div>
      <div class="nav-label">League</div>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Profile</div>
    </a>
  </div>

  <script src="lessons.js"></script>
  <script src="lesson-service.js"></script>
  <script>
    const pillars = [
      { id: "mental-health", name: "Mental", emoji: "🧠", color: "#A78BFA" },
      { id: "relationships", name: "Relations", emoji: "💬", color: "#F472B6" },
      { id: "career", name: "Career", emoji: "💼", color: "#60A5FA" },
      { id: "fitness", name: "Fitness", emoji: "💪", color: "#34D399" },
      { id: "finance", name: "Finance", emoji: "💰", color: "#FBBF24" },
      { id: "hobbies", name: "Hobbies", emoji: "🎨", color: "#F87171" }
    ];

    const challenges = {
      "mental-health": "Take 3 deep breaths before your next meeting or task",
      "relationships": "Send a genuine compliment to someone you care about",
      "career": "Spend 10 minutes updating your resume or LinkedIn",
      "fitness": "Do 20 bodyweight squats or a 5-minute walk",
      "finance": "Review your last 3 purchases and categorize them",
      "hobbies": "Dedicate 15 minutes to something purely for fun"
    };

    let selectedPillar = "mental-health";
    const progress = getLessonProgress();

    function renderChips() {
      const container = document.getElementById('filter-chips');
      container.innerHTML = '';
      pillars.forEach(p => {
        const chip = document.createElement('div');
        chip.className = 'filter-chip' + (p.id === selectedPillar ? ' active' : '');
        chip.style.setProperty('--pillar-color', p.color);
        chip.onclick = () => {
          selectedPillar = p.id;
          render();
        };
        chip.innerHTML = `
          <span class="chip-emoji">${p.emoji}</span>
          <span class="chip-text">${p.name}</span>
        `;
        container.appendChild(chip);
      });
    }

    function renderLessons() {
      const container = document.getElementById('lessons-list');
      container.innerHTML = '';
      const lessons = allLessons[selectedPillar] || [];
      const pillar = pillars.find(p => p.id === selectedPillar);
      
      lessons.forEach((lesson, idx) => {
        const isCompleted = progress[selectedPillar]?.[lesson.id]?.completed;
        const card = document.createElement('div');
        card.className = 'lesson-card';
        card.onclick = () => {
          window.location.href = `lesson.html?pillar=${selectedPillar}&lesson=${lesson.id}`;
        };
        card.innerHTML = `
          <div class="lesson-icon" style="background: ${pillar.color};">
            ${idx + 1}
          </div>
          <div class="lesson-content">
            <div class="lesson-title">${lesson.title}</div>
            <div class="lesson-subtitle">${lesson.content.paragraphs[0].substring(0, 50)}...</div>
            <div class="lesson-meta">
              <span>${lesson.duration}</span>
              <span>•</span>
              <span>${lesson.difficulty}</span>
            </div>
          </div>
          <div class="lesson-action">
            ${isCompleted ? '✓' : '→'}
          </div>
        `;
        container.appendChild(card);
      });
    }

    function renderChallenge() {
      const card = document.getElementById('challenge-card');
      const pillar = pillars.find(p => p.id === selectedPillar);
      card.style.display = 'block';
      card.innerHTML = `
        <div class="challenge-header">
          <div class="challenge-title">Today's ${pillar.name} Challenge</div>
          <div class="xp-badge">+30 XP</div>
        </div>
        <div class="challenge-desc">${challenges[selectedPillar]}</div>
        <button class="challenge-btn" onclick="acceptChallenge()">Accept Challenge →</button>
      `;
    }

    function acceptChallenge() {
      alert('Challenge accepted! +30 XP earned');
    }

    function render() {
      renderChips();
      renderLessons();
      renderChallenge();
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
