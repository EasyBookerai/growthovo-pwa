<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pillars - Growthovo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0A0A12;
      color: #FFFFFF;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .header { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
    .pillars-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .pillar-card {
      background: #1A1A2E;
      border: 1px solid rgba(255,255,255,0.1);
      border-left: 4px solid;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .pillar-card:hover { background: #222238; transform: translateY(-2px); }
    .pillar-emoji { font-size: 32px; margin-bottom: 8px; }
    .pillar-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .pillar-level { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    .xp-bar-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .xp-bar-fill { height: 100%; background: currentColor; transition: width 0.3s; }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8,8,15,0.95);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 12px 20px 20px;
      display: flex;
      justify-content: space-around;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      text-decoration: none;
      color: rgba(255,255,255,0.5);
    }
    .nav-item.active { color: #A78BFA; }
    .nav-icon { font-size: 24px; }
    .nav-label { font-size: 11px; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="header">Your Growth Pillars</h1>
    <div class="pillars-grid" id="pillars-grid">
      <!-- Pillars rendered by JS -->
    </div>
  </div>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </a>
    <a href="pillars.html" class="nav-item active">
      <div class="nav-icon">🎯</div>
      <div class="nav-label">Pillars</div>
    </a>
    <a href="rex.html" class="nav-item">
      <div class="nav-icon">💬</div>
      <div class="nav-label">Rex</div>
    </a>
    <a href="league.html" class="nav-item">
      <div class="nav-icon">🏆</div>
      <div class="nav-label">League</div>
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Profile</div>
    </a>
  </div>

  <script src="lessons.js"></script>
  <script src="lesson-service.js"></script>
  <script>
    const pillars = [
      { id: "mental-health", name: "Mental Health", emoji: "🧠", color: "#A78BFA" },
      { id: "relationships", name: "Relationships", emoji: "💬", color: "#F472B6" },
      { id: "career", name: "Career", emoji: "💼", color: "#60A5FA" },
      { id: "fitness", name: "Fitness", emoji: "💪", color: "#34D399" },
      { id: "finance", name: "Finance", emoji: "💰", color: "#FBBF24" },
      { id: "hobbies", name: "Hobbies", emoji: "🎨", color: "#F87171" }
    ];

    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('pillars-grid');
      const progress = getLessonProgress();
      
      pillars.forEach(p => {
        const lessons = allLessons[p.id] || [];
        const completedCount = lessons.filter(l => progress[p.id]?.[l.id]?.completed).length;
        const level = Math.floor(completedCount / 3) + 1;
        const xpInLevel = completedCount % 3;
        const xpProgress = (xpInLevel / 3) * 100;
        
        const card = document.createElement('div');
        card.className = 'pillar-card';
        card.style.borderLeftColor = p.color;
        card.style.color = p.color;
        card.onclick = () => {
          window.location.href = `skill-tree.html?pillar=${p.id}`;
        };
        card.innerHTML = `
          <div class="pillar-emoji">${p.emoji}</div>
          <div class="pillar-name">${p.name}</div>
          <div class="pillar-level">Level ${level}</div>
          <div class="xp-bar-container">
            <div class="xp-bar-fill" style="width: ${xpProgress}%; background: ${p.color};"></div>
          </div>
        `;
        grid.appendChild(card);
      });
    });
  </script>
</body>
</html>
