<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Growthovo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0A0A12;
      color: #FFFFFF;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7C3AED, #A78BFA);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .username { font-size: 24px; font-weight: 700; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 700; color: #A78BFA; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .settings-list { margin-bottom: 24px; }
    .setting-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .logout-btn {
      width: 100%;
      padding: 16px;
      background: transparent;
      border: 2px solid #EF4444;
      border-radius: 100px;
      color: #EF4444;
      font-weight: 600;
      cursor: pointer;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8,8,15,0.95);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 12px 20px 20px;
      display: flex;
      justify-content: space-around;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      text-decoration: none;
      color: rgba(255,255,255,0.5);
    }
    .nav-item.active { color: #A78BFA; }
    .nav-icon { font-size: 24px; }
    .nav-label { font-size: 11px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-header">
      <div class="avatar">C</div>
      <div class="username">Champion</div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value">0</div>
        <div class="stat-label">Total XP</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">0</div>
        <div class="stat-label">Lessons</div>
      </div>
    </div>

    <div class="settings-list">
      <div class="setting-item">
        <span>✏️ Edit Profile</span>
        <span>→</span>
      </div>
      <div class="setting-item">
        <span>🔔 Notifications</span>
        <span>→</span>
      </div>
      <div class="setting-item">
        <span>🌐 Language</span>
        <span>English</span>
      </div>
      <div class="setting-item">
        <span>🔒 Privacy & Data</span>
        <span>→</span>
      </div>
      <div class="setting-item">
        <span>❓ Help Center</span>
        <span>→</span>
      </div>
      <div class="setting-item">
        <span>⭐ Rate Growthovo</span>
        <span>→</span>
      </div>
    </div>

    <button class="logout-btn">Log Out</button>
  </div>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </a>
    <a href="pillars.html" class="nav-item">
      <div class="nav-icon">🎯</div>
      <div class="nav-label">Pillars</div>
    </a>
    <a href="rex.html" class="nav-item">
      <div class="nav-icon">💬</div>
      <div class="nav-label">Rex</div>
    </a>
    <a href="league.html" class="nav-item">
      <div class="nav-icon">🏆</div>
      <div class="nav-label">League</div>
    </a>
    <a href="profile.html" class="nav-item active">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Profile</div>
    </a>
  </div>
</body>
</html>
